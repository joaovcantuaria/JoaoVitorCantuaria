<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - João V. Cantuária</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../auth-styles.css">
    <link rel="stylesheet" href="admin-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <section class="auth-section admin-login-section">
        <div class="auth-container">
            <div class="admin-login-box">
                <div class="admin-logo">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h1 class="admin-title">Painel Administrativo</h1>
                <p class="admin-subtitle">Acesso restrito ao administrador</p>

                <div id="adminMessage" class="auth-message"></div>

                <form id="adminLoginForm" class="auth-form">
                    <div class="form-group">
                        <label for="adminEmail">
                            <i class="fas fa-envelope"></i> E-mail Admin
                        </label>
                        <input type="email" 
                               id="adminEmail" 
                               name="email" 
                               required 
                               placeholder="admin@joaovcantuaria.com"
                               autocomplete="email">
                    </div>

                    <div class="form-group">
                        <label for="adminPassword">
                            <i class="fas fa-lock"></i> Senha Admin
                        </label>
                        <div class="password-input-wrapper">
                            <input type="password" 
                                   id="adminPassword" 
                                   name="password" 
                                   required 
                                   placeholder="••••••••"
                                   autocomplete="current-password">
                            <button type="button" class="toggle-password" data-target="adminPassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" name="remember" id="rememberAdmin">
                            <span>Manter conectado</span>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block btn-auth">
                        <i class="fas fa-sign-in-alt"></i> Acessar Painel
                    </button>
                </form>

                <div class="admin-info">
                    <i class="fas fa-info-circle"></i>
                    <p>Este é o acesso exclusivo do administrador. Se você é cliente, <a href="../login.html">clique aqui</a>.</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>
    <script src="admin-auth.js"></script>
</body>
</html>
